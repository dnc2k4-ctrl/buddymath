<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SmartBuddy — Cổng Phụ Huynh</title>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;700;800&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --teal:#2EC4A0;--teal-d:#1A7A60;
  --blue:#3742FA;--purple:#A55EEA;
  --yellow:#FFD700;--orange:#FF6B35;
  --red:#FF4757;--green:#2ED573;
  --bg:#EEF8F5;--white:#fff;
  --text1:#1A2340;--text2:#5A6890;--text3:#A0AABF;
  --shadow:0 4px 0 rgba(0,0,0,.10);
}
html,body{height:100%;overflow:hidden;font-family:'Nunito',Arial;background:var(--bg);color:var(--text1);}

/* ── Header ── */
.header{
  height:62px;background:linear-gradient(135deg,#2EC4A0,#1E90FF 60%,#A55EEA);
  display:flex;align-items:center;gap:14px;padding:0 20px;
  box-shadow:0 4px 0 rgba(0,0,0,.12);flex-shrink:0;
}
.h-logo{font-family:'Baloo 2',cursive;font-size:22px;color:white;font-weight:800;display:flex;align-items:center;gap:8px;}
.h-badge{background:rgba(255,255,255,.25);color:white;font-size:11px;font-weight:900;padding:3px 10px;border-radius:14px;border:1.5px solid rgba(255,255,255,.4);}
.h-right{margin-left:auto;display:flex;align-items:center;gap:10px;}
.h-user{color:white;font-size:13px;font-weight:800;display:flex;align-items:center;gap:7px;}
.h-avatar{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.25);display:flex;align-items:center;justify-content:center;font-size:16px;}
.logout-btn{background:rgba(255,255,255,.18);color:white;border:1.5px solid rgba(255,255,255,.4);border-radius:10px;padding:6px 13px;font-family:'Nunito',Arial;font-size:12px;font-weight:800;cursor:pointer;transition:all .15s;}
.logout-btn:hover{background:rgba(255,255,255,.3);}

/* ── Layout ── */
.layout{display:grid;grid-template-columns:280px 1fr;flex:1;overflow:hidden;height:calc(100vh - 62px);}

/* ── Sidebar ── */
.sidebar{background:white;border-right:2px solid rgba(0,0,0,.06);padding:16px 12px;overflow-y:auto;display:flex;flex-direction:column;gap:12px;}
.sidebar-title{font-size:10px;font-weight:900;color:var(--text3);letter-spacing:.12em;text-transform:uppercase;padding:0 4px;}

.child-card{
  background:linear-gradient(135deg,#F8FFFE,#EFF8FF);border-radius:16px;padding:14px;
  border:2px solid #D0F0E8;cursor:pointer;transition:all .18s cubic-bezier(.34,1.56,.64,1);
}
.child-card:hover,.child-card.active{border-color:var(--teal);box-shadow:0 5px 0 rgba(46,196,160,.2);}
.child-card.active{background:linear-gradient(135deg,#E8FFF8,#E0F8FF);}
.cc-name{font-size:15px;font-weight:900;color:var(--text1);display:flex;align-items:center;gap:8px;}
.cc-meta{font-size:12px;color:var(--text2);font-weight:600;margin-top:4px;}
.cc-stats{display:flex;gap:8px;margin-top:10px;flex-wrap:wrap;}
.cc-stat{background:white;border-radius:10px;padding:6px 10px;font-size:11px;font-weight:800;color:var(--text2);border:1.5px solid #E0F0EA;}
.cc-stat span{color:var(--teal-d);font-weight:900;}

/* Link child form */
.link-box{background:linear-gradient(135deg,#F5F0FF,#EEF4FF);border-radius:16px;padding:14px;border:2px solid #D8D0FF;}
.link-title{font-size:13px;font-weight:900;color:var(--purple);margin-bottom:10px;display:flex;align-items:center;gap:6px;}
.link-input{width:100%;padding:10px 12px;border:2px solid #D8D0FF;border-radius:12px;font-family:'Nunito',Arial;font-size:13px;font-weight:700;color:var(--text1);outline:none;background:white;margin-bottom:8px;transition:all .2s;}
.link-input:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(165,94,234,.12);}
.link-btn{width:100%;padding:10px;border:none;border-radius:12px;background:linear-gradient(135deg,#A55EEA,#3742FA);color:white;font-family:'Nunito',Arial;font-size:13px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(55,66,250,.3);transition:all .15s;}
.link-btn:hover{transform:translateY(-1px);}

/* ── Main ── */
.main{overflow-y:auto;padding:20px 24px;display:flex;flex-direction:column;gap:18px;}

/* No child selected state */
.empty-state{display:flex;flex-direction:column;align-items:center;justify-content:center;height:60vh;gap:14px;color:var(--text3);font-weight:700;text-align:center;}
.empty-icon{font-size:48px;}

/* ── Report header ── */
.report-header{display:flex;align-items:center;gap:14px;background:white;border-radius:20px;padding:18px 20px;box-shadow:var(--shadow);border:2px solid #E8F5F0;}
.rh-avatar{width:60px;height:60px;border-radius:18px;background:linear-gradient(135deg,#2EC4A0,#1E90FF);display:flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 5px 0 rgba(46,196,160,.3);}
.rh-name{font-family:'Baloo 2',cursive;font-size:22px;color:var(--text1);}
.rh-meta{font-size:13px;color:var(--text2);font-weight:600;margin-top:2px;}
.rh-actions{margin-left:auto;display:flex;gap:10px;flex-wrap:wrap;}
.period-btn{padding:8px 14px;border:2.5px solid #E0E8F0;border-radius:12px;background:white;cursor:pointer;font-family:'Nunito',Arial;font-size:12px;font-weight:800;color:var(--text2);transition:all .15s;}
.period-btn.active,.period-btn:hover{background:var(--teal);color:white;border-color:var(--teal);}
.send-report-btn{padding:8px 16px;border:none;border-radius:12px;background:linear-gradient(135deg,#FF6B35,#FF4757);color:white;font-family:'Nunito',Arial;font-size:12px;font-weight:900;cursor:pointer;box-shadow:0 4px 0 rgba(255,71,87,.3);transition:all .15s;}
.send-report-btn:hover{transform:translateY(-1px);}

/* ── Stats row ── */
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;}
.stat-card{background:white;border-radius:18px;padding:16px 18px;box-shadow:var(--shadow);border:2px solid transparent;text-align:center;}
.stat-card:nth-child(1){border-color:#D0F0E8;}
.stat-card:nth-child(2){border-color:#D8D0FF;}
.stat-card:nth-child(3){border-color:#FFE0B0;}
.stat-num{font-family:'Baloo 2',cursive;font-size:32px;font-weight:900;}
.stat-card:nth-child(1) .stat-num{color:var(--teal);}
.stat-card:nth-child(2) .stat-num{color:var(--purple);}
.stat-card:nth-child(3) .stat-num{color:var(--orange);}
.stat-label{font-size:12px;color:var(--text2);font-weight:700;margin-top:4px;}

/* ── Subject panels ── */
.subj-section{background:white;border-radius:18px;padding:18px 20px;box-shadow:var(--shadow);border:2px solid #F0F0FF;}
.subj-header{display:flex;align-items:center;gap:10px;margin-bottom:14px;}
.subj-icon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;box-shadow:0 3px 0 rgba(0,0,0,.12);}
.subj-name{font-family:'Baloo 2',cursive;font-size:18px;color:var(--text1);}
.subj-avg{margin-left:auto;font-size:22px;font-weight:900;font-family:'Baloo 2',cursive;}

.score-timeline{display:flex;flex-direction:column;gap:8px;}
.score-row{display:flex;align-items:center;gap:12px;padding:10px 14px;background:#FAFAFA;border-radius:12px;border:1.5px solid #EEE;font-size:13px;}
.score-topic{flex:1;font-weight:700;color:var(--text1);}
.score-date{font-size:11px;color:var(--text3);font-weight:600;white-space:nowrap;}
.score-pct{width:52px;text-align:center;font-weight:900;font-size:14px;padding:4px 8px;border-radius:8px;}
.score-pct.great{background:#E8FFF4;color:#1A7A40;}
.score-pct.good{background:#FFF8E0;color:#856404;}
.score-pct.low{background:#FFF0F0;color:#C0392B;}
.score-bar-bg{flex:1;height:8px;background:#EEE;border-radius:8px;overflow:hidden;}
.score-bar-fill{height:100%;border-radius:8px;transition:width .5s cubic-bezier(.34,1.56,.64,1);}

/* Feedback box */
.feedback-text{font-size:12px;color:var(--text2);font-weight:600;margin-top:6px;padding:8px 12px;background:#F8F8FF;border-radius:8px;border-left:3px solid var(--purple);line-height:1.5;display:none;}
.score-row:hover .feedback-text{display:block;}

/* Toast */
.toast{
  position:fixed;bottom:20px;right:20px;background:#1A2340;color:white;
  border-radius:14px;padding:12px 20px;font-size:13px;font-weight:700;
  z-index:9999;opacity:0;transform:translateY(20px);
  transition:all .3s cubic-bezier(.34,1.56,.64,1);box-shadow:0 8px 24px rgba(0,0,0,.2);
}
.toast.show{opacity:1;transform:translateY(0);}

/* Loading */
.loading-spinner{width:36px;height:36px;border-radius:50%;border:4px solid #E0F0EA;border-top-color:var(--teal);animation:spin .7s linear infinite;margin:auto;}
@keyframes spin{to{transform:rotate(360deg);}}
</style>
</head>
<body>

<!-- Header -->
<div class="header">
  <div class="h-logo">
    <span>🤖</span> SmartBuddy
  </div>
  <div class="h-badge">Cổng Phụ Huynh</div>
  <div class="h-right">
    <div class="h-user">
      <div class="h-avatar">👨‍👩‍👧</div>
      <span id="parent-name">Phụ huynh</span>
    </div>
    <button class="logout-btn" onclick="logout()">🚪 Đăng xuất</button>
  </div>
</div>

<div class="layout">
  <!-- Sidebar -->
  <div class="sidebar">
    <div class="sidebar-title">Con em tôi</div>
    <div id="children-list">
      <div class="loading-spinner"></div>
    </div>

    <div style="margin-top:8px;"></div>
    <div class="sidebar-title">Thêm tài khoản con</div>
    <div class="link-box">
      <div class="link-title">🔗 Liên kết tài khoản học sinh</div>
      <input class="link-input" id="child-email-input" type="email" placeholder="Email của con em...">
      <button class="link-btn" onclick="linkChild()">➕ Liên kết</button>
      <div id="link-msg" style="font-size:12px;margin-top:8px;font-weight:600;color:var(--teal);display:none;"></div>
    </div>
  </div>

  <!-- Main content -->
  <div class="main" id="main-content">
    <div class="empty-state" id="empty-state">
      <div class="empty-icon">👨‍👩‍👧</div>
      <div style="font-size:18px;font-weight:900;color:var(--text2);">Chọn con em để xem báo cáo</div>
      <div style="max-width:280px;line-height:1.6;">Nhấn vào tên con em ở thanh bên trái để xem chi tiết tiến trình học tập.</div>
    </div>
    <div id="report-content" style="display:none;flex-direction:column;gap:18px;"></div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// Same-origin: BE phục vụ luôn FE nên API trỏ về chính domain đang chạy
// (localhost khi dev, *.onrender.com khi deploy). Fallback localhost khi mở file://.
const API = (location.protocol !== 'file:' && location.hostname)
  ? location.protocol + '//' + location.hostname + (location.port ? ':' + location.port : '')
  : 'http://localhost:8000';
let token      = localStorage.getItem('sb_token');
let user       = JSON.parse(localStorage.getItem('sb_user') || 'null');
let selectedChild = null;
let currentPeriod = 'week';

// ── Auth guard ─────────────────────────────────────────────────────────────────
if (!token || !user) {
  window.location.href = '/';
}
if (user && user.role !== 'parent') {
  window.location.href = '/app';
}

document.getElementById('parent-name').textContent = user?.username || 'Phụ huynh';

// ── Load children ─────────────────────────────────────────────────────────────
async function loadChildren() {
  try {
    const res     = await authFetch('/parent/children');
    const children = await res.json();
    const list    = document.getElementById('children-list');

    if (!children.length) {
      list.innerHTML = `<div style="font-size:13px;color:var(--text3);font-weight:600;text-align:center;padding:12px;">
        Chưa có con em nào được liên kết.<br>Thêm email con em bên dưới!
      </div>`;
      return;
    }

    list.innerHTML = children.map(c => `
      <div class="child-card" onclick="selectChild('${c.id}', '${c.username}', ${c.grade})" id="child-${c.id}">
        <div class="cc-name">🎒 ${c.username}</div>
        <div class="cc-meta">Lớp ${c.grade} · ${c.email}</div>
        <div class="cc-stats">
          <div class="cc-stat">Tuần này: <span>${c.week_sessions} bài</span></div>
          ${c.week_avg_pct !== null ? `<div class="cc-stat">TB: <span>${c.week_avg_pct}%</span></div>` : ''}
          <div class="cc-stat">Tổng: <span>${c.total_sessions}</span></div>
        </div>
      </div>
    `).join('');
  } catch(e) {
    console.error(e);
  }
}

// ── Select child ───────────────────────────────────────────────────────────────
async function selectChild(id, name, grade) {
  selectedChild = { id, name, grade };
  document.querySelectorAll('.child-card').forEach(c => c.classList.remove('active'));
  document.getElementById('child-'+id)?.classList.add('active');
  loadReport();
}

// ── Load report ────────────────────────────────────────────────────────────────
async function loadReport() {
  if (!selectedChild) return;
  document.getElementById('empty-state').style.display   = 'none';
  const rc = document.getElementById('report-content');
  rc.style.display   = 'flex';
  rc.innerHTML       = '<div class="loading-spinner"></div>';

  try {
    const res    = await authFetch(`/parent/reports/${selectedChild.id}?period=${currentPeriod}`);
    const report = await res.json();
    renderReport(report);
  } catch(e) {
    rc.innerHTML = `<div style="color:var(--red);font-weight:700;padding:20px;">Lỗi tải báo cáo: ${e.message}</div>`;
  }
}

// ── Render report ─────────────────────────────────────────────────────────────
function renderReport(r) {
  const rc     = document.getElementById('report-content');
  const total  = r.total_sessions;
  const subjKeys = Object.keys(r.by_subject);

  // Calculate overall avg
  let allPcts = [];
  for (const [_, recs] of Object.entries(r.by_subject)) {
    for (const rec of recs) allPcts.push(rec.pct);
  }
  const overallAvg = allPcts.length ? Math.round(allPcts.reduce((a,b) => a+b,0)/allPcts.length) : null;

  const periodLabel = currentPeriod === 'week' ? '7 ngày qua' : '30 ngày qua';

  rc.innerHTML = `
    <!-- Header -->
    <div class="report-header">
      <div class="rh-avatar">🎒</div>
      <div>
        <div class="rh-name">${r.child.username}</div>
        <div class="rh-meta">Lớp ${r.child.grade} · ${periodLabel}</div>
      </div>
      <div class="rh-actions">
        <button class="period-btn ${currentPeriod==='week'?'active':''}" onclick="setPeriod('week')">7 ngày</button>
        <button class="period-btn ${currentPeriod==='month'?'active':''}" onclick="setPeriod('month')">30 ngày</button>
        <button class="send-report-btn" onclick="sendEmailReport()">📧 Gửi báo cáo qua email</button>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-num">${total}</div>
        <div class="stat-label">Bài đã hoàn thành</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${subjKeys.length}</div>
        <div class="stat-label">Môn đã học</div>
      </div>
      <div class="stat-card">
        <div class="stat-num">${overallAvg !== null ? overallAvg + '%' : '—'}</div>
        <div class="stat-label">Điểm trung bình</div>
      </div>
    </div>

    ${total === 0 ? `
    <div class="empty-state" style="height:200px;">
      <div class="empty-icon">📚</div>
      <div>Chưa có bài nào trong ${periodLabel}</div>
    </div>` : ''}

    ${subjKeys.map(subj => renderSubjectPanel(subj, r.by_subject[subj])).join('')}
  `;
}

function renderSubjectPanel(subj, recs) {
  const avg   = Math.round(recs.reduce((s,r)=>s+r.pct,0)/recs.length);
  const color = avg >= 80 ? '#2ED573' : avg >= 60 ? '#FF6B35' : '#FF4757';
  const icon  = subj==='Toán'?'📐':subj==='Tiếng Anh'?'🌏':subj==='Kỹ năng sống'?'🌟':'📚';

  const rows = recs.slice(0,10).map(r => {
    const cls   = r.pct>=80?'great':r.pct>=60?'good':'low';
    const fColor = r.pct>=80?'#2ED573':r.pct>=60?'#FF6B35':'#FF4757';
    const dateStr = new Date(r.date).toLocaleDateString('vi-VN',{day:'2-digit',month:'2-digit'});
    return `
      <div class="score-row">
        <div class="score-topic">
          ${r.topic || '—'}
          ${r.feedback ? `<div class="feedback-text">💬 ${r.feedback}</div>` : ''}
        </div>
        <div class="score-date">${dateStr}</div>
        <div class="score-bar-bg"><div class="score-bar-fill" style="width:${r.pct}%;background:${fColor};"></div></div>
        <div class="score-pct ${cls}">${r.pct}%</div>
      </div>`;
  }).join('');

  return `
    <div class="subj-section">
      <div class="subj-header">
        <div class="subj-icon" style="background:linear-gradient(135deg,${color}99,${color}55);">${icon}</div>
        <div class="subj-name">${subj}</div>
        <div class="subj-avg" style="color:${color}">${avg}%</div>
      </div>
      <div class="score-timeline">${rows}</div>
    </div>`;
}

// ── Set period ─────────────────────────────────────────────────────────────────
function setPeriod(p) {
  currentPeriod = p;
  if (selectedChild) loadReport();
}

// ── Link child ─────────────────────────────────────────────────────────────────
async function linkChild() {
  const email = document.getElementById('child-email-input').value.trim();
  if (!email) return;
  const msgEl = document.getElementById('link-msg');
  msgEl.style.display = 'block';
  msgEl.style.color   = 'var(--text2)';
  msgEl.textContent   = '🔄 Đang liên kết...';

  try {
    const res  = await authFetch('/parent/link-child', 'POST', { child_email: email });
    const data = await res.json();
    if (!res.ok) { msgEl.style.color='var(--red)'; msgEl.textContent='⚠️ '+data.detail; return; }
    msgEl.style.color   = 'var(--teal)';
    msgEl.textContent   = `✅ Đã liên kết với ${data.child.username}!`;
    document.getElementById('child-email-input').value = '';
    loadChildren();
  } catch(e) {
    msgEl.style.color='var(--red)'; msgEl.textContent='❌ Lỗi kết nối';
  }
}

// ── Send email report ──────────────────────────────────────────────────────────
async function sendEmailReport() {
  if (!selectedChild) return;
  showToast('📧 Đang gửi báo cáo...');
  try {
    const res  = await authFetch('/parent/send-report', 'POST', {
      child_id: selectedChild.id, period: currentPeriod
    });
    const data = await res.json();
    if (!res.ok) { showToast('❌ '+data.detail, 4000); return; }
    showToast('✅ '+data.message, 3000);
  } catch(e) {
    showToast('❌ Lỗi gửi email: '+e.message, 4000);
  }
}

// ── Helpers ───────────────────────────────────────────────────────────────────
async function authFetch(path, method='GET', body=null) {
  const opts = {
    method,
    headers: {'Authorization':'Bearer '+token, 'Content-Type':'application/json'},
  };
  if (body) opts.body = JSON.stringify(body);
  return fetch(API+path, opts);
}

function showToast(msg, duration=2500) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), duration);
}

function logout() {
  localStorage.removeItem('sb_token');
  localStorage.removeItem('sb_user');
  window.location.href = '/';
}

// ── Init ──────────────────────────────────────────────────────────────────────
loadChildren();
</script>
</body>
</html>
