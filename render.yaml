# ════════════════════════════════════════════════════════════════
#  Render Blueprint — BuddyMath (BE phục vụ luôn FE) + Postgres BỀN
#
#  ✅ Khối "databases" bên dưới yêu cầu Render TỰ TẠO một PostgreSQL
#     và tự gắn vào biến DATABASE_URL của web service (fromDatabase).
#     → Dữ liệu người dùng KHÔNG còn bị reset mỗi lần deploy.
#
#  Cách áp dụng: Render Dashboard → Blueprints → chọn blueprint này →
#     "Sync"/"Apply". Render sẽ tạo DB "buddymath-db" và deploy lại.
#
#  ⚠ Lưu ý: gói Postgres FREE của Render bị xoá sau ~30 ngày. Muốn giữ
#     VĨNH VIỄN: tạo DB free ở Neon (https://neon.tech) — KHÔNG hết hạn —
#     rồi thay dòng DATABASE_URL bên dưới bằng: {sync:false} và dán chuỗi
#     kết nối Neon vào Environment trong Dashboard.
# ════════════════════════════════════════════════════════════════

databases:
  - name: smartbuddy-db-sg
    plan: free
    region: singapore           # PHẢI cùng region với web service (kết nối nội bộ)
    databaseName: mathbuddy
    user: mathbuddy

services:
  - type: web
    name: buddymath
    runtime: python
    plan: free                  # ⚠ free web service ngủ sau ~15' không truy cập
    region: singapore           # cùng region với database ở trên
    rootDir: buddymath/BE        # build & chạy trong thư mục BE
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.12"
      # DB BỀN: Render tự bơm chuỗi kết nối của "smartbuddy-db-sg" (Singapore) vào đây.
      - key: DATABASE_URL
        fromDatabase:
          name: smartbuddy-db-sg
          property: connectionString
      # Secret — điền trong Dashboard (sync:false = không commit vào repo)
      - key: GROQ_API_KEY
        sync: false
      - key: JINA_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true     # Render tự sinh chuỗi ngẫu nhiên
      # Cấu hình mặc định (có thể đổi trong Dashboard)
      - key: GROQ_MODEL
        value: meta-llama/llama-4-scout-17b-16e-instruct
      - key: JINA_MODEL
        value: jina-embeddings-v3
      # URL công khai dùng trong link email báo cáo (điền sau khi biết domain Render)
      - key: PUBLIC_BASE_URL
        sync: false
      # ── Email báo cáo phụ huynh (để dùng nút "Gửi báo cáo qua email") ──
      # SMTP_USER = địa chỉ Gmail dùng để GỬI; SMTP_PASS = "App Password" 16 ký tự
      # (tạo tại https://myaccount.google.com/apppasswords — cần bật 2FA trước).
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: FROM_EMAIL
        sync: false
